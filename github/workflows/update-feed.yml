name: Update RSS Feed

on:
  schedule:
    - cron: "0 */2 * * *"   # runs every 2 hours
  workflow_dispatch:          # also lets you run it manually

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed to commit feed.xml back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --cached --quiet || git commit -m "Update RSS feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
```

The `git diff --cached --quiet ||` part means it only commits if `feed.xml` actually changed — no junk commits when nothing is new.

